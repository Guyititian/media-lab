<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Media Tiles</title>

<style>
body {
  margin:0;
  background:#070707;
  color:white;
  font-family:Arial;
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
}

/* ROOT STACK */
.container {
  text-align:center;
}

/* =========================
   FLOATING BRAND OBJECT
========================= */
.brand {
  font-size:64px;
  font-weight:600;

  padding:26px 54px;
  border-radius:24px;

  display:inline-block;

  background: rgba(255,255,255,0.06);
  border:1px solid rgba(255,255,255,0.10);

  box-shadow:
    0 30px 90px rgba(0,0,0,0.85),
    0 0 60px rgba(255,255,255,0.12);

  backdrop-filter: blur(14px);

  letter-spacing:1px;

  margin-bottom:50px;
}

.sub {
  font-size:13px;
  opacity:0.55;
  margin-top:-35px;
  margin-bottom:50px;
}

/* =========================
   NAV CARDS (BIGGER + WEIGHTED)
========================= */
.cards {
  display:flex;
  justify-content:center;
  gap:50px;
}

.card {
  width:380px;
  padding:30px;

  border-radius:20px;

  background: rgba(255,255,255,0.04);
  border:1px solid rgba(255,255,255,0.08);

  box-shadow: 0 25px 70px rgba(0,0,0,0.7);

  cursor:pointer;

  transition:0.25s;
}

.card:hover {
  transform:translateY(-12px);
  box-shadow:
    0 40px 110px rgba(0,0,0,0.9),
    0 0 40px rgba(255,255,255,0.12);
}

.card h2 {
  margin:0 0 12px;
  font-size:22px;
}

.card p {
  font-size:13px;
  opacity:0.7;
  line-height:1.4;
}

/* FOOTER */
.footer {
  margin-top:60px;
  font-size:12px;
  opacity:0.35;
}
</style>
</head>

<body>

<div class="container">

  <div class="brand">Media Tiles</div>

  <div class="sub">Ecosystem for media browsing and transformation</div>

  <div class="cards">
    <div class="card" onclick="window.location.href='./browse.html'">
      <h2>Library</h2>
      <p>Browse curated collections and copy media asset links.</p>
    </div>

    <div class="card" onclick="window.location.href='https://guyititian.github.io/media-lab/'">
      <h2>Tools</h2>
      <p>Upload media and process it through motion + GIF pipelines.</p>
    </div>
  </div>

</div>

</body>
</html>
