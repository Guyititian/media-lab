<script>

const API_URL = "https://media-lab.onrender.com/upload";

function goHome() {
  window.location.href = "https://guyititian.github.io/media-tiles/";
}

async function runTool() {
  const outputEl = document.getElementById("output");

  try {
    const file = document.getElementById("file").files[0];
    const tool = document.getElementById("tool").value;
    const preset = document.getElementById("preset").value;

    if (!file) {
      outputEl.innerText = "Please select a file.";
      return;
    }

    outputEl.innerText = "Processing...";

    const formData = new FormData();
    formData.append("file", file);
    formData.append("tool", tool);
    formData.append("preset", preset);

    const res = await fetch(API_URL, {
      method: "POST",
      body: formData
    });

    const raw = await res.text();
    console.log("RAW RESPONSE:", raw);

    let data;
    try {
      data = JSON.parse(raw);
    } catch (e) {
      throw new Error("Invalid JSON from backend");
    }

    // ✅ HARD STOP ERROR HANDLING (IMPORTANT FIX)
    if (!data.success) {
      throw new Error(data.error || "Backend failed request");
    }

    const urlPart = data.output_url;

    if (!urlPart) {
      throw new Error("Missing output_url");
    }

    const finalUrl = new URL(
      urlPart,
      "https://media-lab.onrender.com"
    ).href;

    outputEl.innerHTML =
      `<a href="${finalUrl}" target="_blank" download>Download GIF</a>`;

  } catch (err) {
    console.error("FULL ERROR:", err);
    outputEl.innerText = "ERROR: " + err.message;
  }
}

</script>
