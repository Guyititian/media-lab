<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Media-Lab</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: #0f0f0f;
  color: white;
}

/* HEADER */
.header {
  display: flex;
  justify-content: space-between;
  padding: 16px 24px;
  background: #111;
  border-bottom: 1px solid #222;
}

.brand {
  cursor: pointer;
  font-weight: bold;
}

.brand:hover {
  opacity: 0.7;
}

/* MAIN */
.container {
  max-width: 600px;
  margin: 40px auto;
  background: #1b1b1b;
  padding: 20px;
  border-radius: 10px;
}

/* INPUTS */
label {
  display: block;
  margin-top: 12px;
  font-size: 12px;
  opacity: 0.7;
}

input, select, button {
  width: 100%;
  margin-top: 6px;
  padding: 10px;
  border-radius: 6px;
  border: none;
}

button {
  margin-top: 16px;
  background: white;
  color: black;
  cursor: pointer;
}

/* STATUS BOX */
#status {
  margin-top: 16px;
  font-size: 13px;
  opacity: 0.8;
}

/* LOADING ANIMATION */
.loader {
  margin-top: 12px;
  width: 18px;
  height: 18px;
  border: 3px solid #444;
  border-top: 3px solid white;
  border-radius: 50%;
  animation: spin 1s linear infinite;
  display: none;
}

@keyframes spin {
  0% { transform: rotate(0deg);}
  100% { transform: rotate(360deg);}
}

/* PRESET INFO PANEL */
#presetInfo {
  margin-top: 10px;
  font-size: 12px;
  opacity: 0.75;
  line-height: 1.4;
}

/* OUTPUT CARD */
#output {
  margin-top: 16px;
  font-size: 14px;
}

.resultCard {
  margin-top: 12px;
  padding: 12px;
  background: #111;
  border-radius: 8px;
  border: 1px solid #222;
}

a {
  color: #00d1ff;
}
</style>
</head>

<body>

<div class="header">
  <div class="brand" onclick="goHome()">Media-Tiles</div>
  <div>Media-Lab Tools</div>
</div>

<div class="container">

  <h2>GIF Motion Tool</h2>

  <label>Upload File</label>
  <input type="file" id="file">

  <label>Tool</label>
  <select id="tool">
    <option value="gif_motion">GIF Motion</option>
  </select>

  <label>Preset</label>
  <select id="preset" onchange="updatePresetInfo()">
    <option value="balanced_v1">Balanced</option>
    <option value="fluid_motion_v1">Fluid Motion</option>
    <option value="cinematic_v1">Cinematic</option>
  </select>

  <div id="presetInfo"></div>

  <button onclick="runTool()">Run Tool</button>

  <div class="loader" id="loader"></div>
  <div id="status"></div>

  <div id="output"></div>
</div>

<script>

const API_URL = "https://media-lab.onrender.com/upload";

/* FRONTEND-ONLY DESCRIPTORS (SAFE ADDITION) */
const PRESET_INFO = {
  balanced_v1: "Stable output. Clean colors, low artifacts, standard motion rendering.",
  fluid_motion_v1: "Enhanced smoothness with stronger motion interpolation and more vivid color grading.",
  cinematic_v1: "Highest visual emphasis. Strong motion smoothing + enhanced contrast + cinematic color shaping."
};

function goHome() {
  window.location.href = "https://guyititian.github.io/media-tiles/";
}

function updatePresetInfo() {
  const preset = document.getElementById("preset").value;
  document.getElementById("presetInfo").innerText = PRESET_INFO[preset] || "";
}

async function runTool() {
  const outputEl = document.getElementById("output");
  const statusEl = document.getElementById("status");
  const loader = document.getElementById("loader");

  try {
    const file = document.getElementById("file").files[0];
    const tool = document.getElementById("tool").value;
    const preset = document.getElementById("preset").value;

    if (!file) {
      outputEl.innerText = "Please select a file.";
      return;
    }

    outputEl.innerHTML = "";
    statusEl.innerText = "Processing video...";
    loader.style.display = "block";

    const formData = new FormData();
    formData.append("file", file);
    formData.append("tool", tool);
    formData.append("preset", preset);

    const res = await fetch(API_URL, {
      method: "POST",
      body: formData
    });

    const raw = await res.text();

    let data;
    try {
      data = JSON.parse(raw);
    } catch (e) {
      throw new Error("Invalid JSON from backend");
    }

    if (!res.ok) {
      throw new Error(data.error || "Request failed");
    }

    if (!data.output_url) {
      throw new Error("Missing output_url");
    }

    const urlPart =
      typeof data.output_url === "string"
        ? data.output_url
        : data.output_url.output_url;

    const finalUrl = new URL(
      urlPart,
      "https://media-lab.onrender.com"
    ).href;

    statusEl.innerText = "Complete ✔";
    loader.style.display = "none";

    outputEl.innerHTML = `
      <div class="resultCard">
        <div>Output ready</div>
        <a href="${finalUrl}" target="_blank">Download GIF</a>
      </div>
    `;

  } catch (err) {
    console.error(err);
    loader.style.display = "none";
    statusEl.innerText = "";
    outputEl.innerText = "ERROR: " + err.message;
  }
}

/* init */
updatePresetInfo();

</script>

</body>
</html>
