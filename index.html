<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Media-Lab</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: #0f0f0f;
  color: white;
}

/* HEADER */
.header {
  display: flex;
  justify-content: space-between;
  padding: 16px 24px;
  background: #111;
  border-bottom: 1px solid #222;
}

.brand {
  cursor: pointer;
  font-weight: bold;
}

.brand:hover { opacity: 0.7; }

/* MAIN */
.container {
  max-width: 600px;
  margin: 40px auto;
  background: #1b1b1b;
  padding: 20px;
  border-radius: 10px;
}

/* INPUTS */
label {
  display: block;
  margin-top: 12px;
  font-size: 12px;
  opacity: 0.7;
}

input, button {
  width: 100%;
  margin-top: 6px;
  padding: 10px;
  border-radius: 6px;
  border: none;
}

button {
  margin-top: 16px;
  background: white;
  color: black;
  cursor: pointer;
}

/* TOOL STATUS */
#status {
  margin-top: 16px;
  font-size: 13px;
  opacity: 0.8;
}

.loader {
  margin-top: 12px;
  width: 18px;
  height: 18px;
  border: 3px solid #444;
  border-top: 3px solid white;
  border-radius: 50%;
  animation: spin 1s linear infinite;
  display: none;
}

@keyframes spin {
  100% { transform: rotate(360deg); }
}

/* =========================
   PRESET TILES (NEW UI)
========================= */

.presetGrid {
  display: grid;
  grid-template-columns: 1fr;
  gap: 10px;
  margin-top: 10px;
}

.presetCard {
  padding: 12px;
  border-radius: 8px;
  background: #111;
  border: 1px solid #222;
  cursor: pointer;
  transition: 0.2s;
}

.presetCard:hover {
  border-color: #555;
}

.presetCard.active {
  border-color: white;
  background: #1a1a1a;
}

.presetTitle {
  font-weight: bold;
  margin-bottom: 4px;
}

.presetDesc {
  font-size: 12px;
  opacity: 0.7;
}

/* OUTPUT */
#output {
  margin-top: 16px;
  font-size: 14px;
}

.resultCard {
  margin-top: 12px;
  padding: 12px;
  background: #111;
  border-radius: 8px;
  border: 1px solid #222;
}

a {
  color: #00d1ff;
}
</style>
</head>

<body>

<div class="header">
  <div class="brand" onclick="goHome()">Media-Tiles</div>
  <div>Media-Lab Tools</div>
</div>

<div class="container">

  <h2>GIF Motion Tool</h2>

  <label>Upload File</label>
  <input type="file" id="file">

  <label>Preset</label>

  <!-- NEW TILE UI -->
  <div class="presetGrid">

    <div class="presetCard active" onclick="selectPreset('balanced_v1', this)">
      <div class="presetTitle">Balanced</div>
      <div class="presetDesc">Stable output. Clean colors, low artifacts, consistent motion.</div>
    </div>

    <div class="presetCard" onclick="selectPreset('fluid_motion_v1', this)">
      <div class="presetTitle">Fluid Motion</div>
      <div class="presetDesc">Smoother motion with stronger interpolation and richer color depth.</div>
    </div>

    <div class="presetCard" onclick="selectPreset('cinematic_v1', this)">
      <div class="presetTitle">Cinematic</div>
      <div class="presetDesc">Highest visual intensity. Enhanced contrast, motion smoothing, film-like output.</div>
    </div>

  </div>

  <input type="hidden" id="preset" value="balanced_v1">

  <button onclick="runTool()">Run Tool</button>

  <div class="loader" id="loader"></div>
  <div id="status"></div>
  <div id="output"></div>
</div>

<script>

const API_URL = "https://media-lab.onrender.com/upload";

function goHome() {
  window.location.href = "https://guyititian.github.io/media-tiles/";
}

/* PRESET SELECTION (SAFE, BACKEND-UNCHANGED) */
function selectPreset(value, el) {
  document.getElementById("preset").value = value;

  document.querySelectorAll(".presetCard")
    .forEach(c => c.classList.remove("active"));

  el.classList.add("active");
}

async function runTool() {
  const outputEl = document.getElementById("output");
  const statusEl = document.getElementById("status");
  const loader = document.getElementById("loader");

  try {
    const file = document.getElementById("file").files[0];
    const tool = "gif_motion";
    const preset = document.getElementById("preset").value;

    if (!file) {
      outputEl.innerText = "Please select a file.";
      return;
    }

    outputEl.innerHTML = "";
    statusEl.innerText = "Processing...";
    loader.style.display = "block";

    const formData = new FormData();
    formData.append("file", file);
    formData.append("tool", tool);
    formData.append("preset", preset);

    const res = await fetch(API_URL, {
      method: "POST",
      body: formData
    });

    const data = await res.json();

    if (!res.ok) throw new Error(data.error || "Request failed");

    const urlPart = data.output_url;
    const finalUrl = new URL(urlPart, "https://media-lab.onrender.com").href;

    loader.style.display = "none";
    statusEl.innerText = "Complete ✔";

    outputEl.innerHTML = `
      <div class="resultCard">
        <div>Output ready</div>
        <a href="${finalUrl}" target="_blank">Download GIF</a>
      </div>
    `;

  } catch (err) {
    loader.style.display = "none";
    statusEl.innerText = "";
    outputEl.innerText = "ERROR: " + err.message;
  }
}

</script>

</body>
</html>
