<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Media Lab</title>

<style>
body {
  margin:0;
  background:#0f0f0f;
  color:white;
  font-family:Arial;
}

.header {
  padding:30px;
  text-align:center;
}

.header h1 {
  margin:0;
  font-size:26px;
}

.header p {
  opacity:0.6;
  font-size:13px;
}

.grid {
  display:flex;
  justify-content:center;
  gap:20px;
  flex-wrap:wrap;
  padding:20px;
}

.card {
  background:#1c1c1c;
  width:240px;
  padding:18px;
  border-radius:12px;
  cursor:pointer;
  transition:0.2s;
}

.card:hover {
  transform:translateY(-4px);
  background:#252525;
}

.card h3 {
  margin:0 0 8px 0;
}

.card p {
  font-size:12px;
  opacity:0.7;
}

.panel {
  max-width:520px;
  margin:30px auto;
  background:#1c1c1c;
  padding:20px;
  border-radius:12px;
  display:none;
}

input[type="file"], button {
  width:100%;
  padding:10px;
  margin-top:10px;
  border:none;
  border-radius:6px;
}

button {
  background:white;
  color:black;
  cursor:pointer;
}

button:hover {
  opacity:0.85;
}

#output {
  margin-top:15px;
  font-size:12px;
  opacity:0.8;
  word-break:break-all;
}
</style>
</head>

<body>

<div class="header">
  <h1>🛠 Media Lab</h1>
  <p>Upload media → process → download output</p>
</div>

<div class="grid">

  <div class="card" onclick="openTool('gif_motion')">
    <h3>GIF Motion</h3>
    <p>Animate images into motion GIFs</p>
  </div>

  <div class="card" onclick="openTool('upscale')">
    <h3>Upscale</h3>
    <p>Enhance resolution and clarity</p>
  </div>

</div>

<div class="panel" id="panel">

  <h3 id="toolTitle"></h3>

  <!-- FILE UPLOAD (THIS IS THE KEY CHANGE) -->
  <input type="file" id="fileInput">

  <button onclick="runTool()">Run Tool</button>

  <div id="output"></div>

</div>

<script>
let currentTool = null;

const API_BASE = "https://YOUR-RENDER-URL.onrender.com";

function openTool(tool) {
  currentTool = tool;
  document.getElementById("panel").style.display = "block";
  document.getElementById("toolTitle").innerText = "Tool: " + tool;
  document.getElementById("output").innerText = "";
}

async function runTool() {
  const file = document.getElementById("fileInput").files[0];

  if (!file) {
    document.getElementById("output").innerText = "Please select a file.";
    return;
  }

  document.getElementById("output").innerText = "Uploading...";

  const formData = new FormData();
  formData.append("file", file);
  formData.append("tool", currentTool);

  try {
    const res = await fetch(`${API_BASE}/api/run`, {
      method: "POST",
      body: formData
    });

    const data = await res.json();

    document.getElementById("output").innerText =
      "Output: " + (data.output_url || JSON.stringify(data));

  } catch (e) {
    document.getElementById("output").innerText =
      "Error: " + e.message;
  }
}
</script>

</body>
</html>
