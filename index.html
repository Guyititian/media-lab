<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Media-Lab</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: #0f0f0f;
  color: white;
}

/* HEADER */
.header {
  display: flex;
  justify-content: space-between;
  padding: 16px 24px;
  background: #111;
  border-bottom: 1px solid #222;
}

.brand {
  cursor: pointer;
  font-weight: bold;
}

.brand:hover {
  opacity: 0.7;
}

/* MAIN */
.container {
  max-width: 600px;
  margin: 40px auto;
  background: #1b1b1b;
  padding: 20px;
  border-radius: 10px;
}

/* INPUTS */
label {
  display: block;
  margin-top: 12px;
  font-size: 12px;
  opacity: 0.7;
}

input, select, button {
  width: 100%;
  margin-top: 6px;
  padding: 10px;
  border-radius: 6px;
  border: none;
}

button {
  margin-top: 16px;
  background: white;
  color: black;
  cursor: pointer;
}

/* OUTPUT */
#output {
  margin-top: 16px;
  font-size: 14px;
  word-break: break-word;
}
</style>
</head>

<body>

<!-- HEADER -->
<div class="header">
  <div class="brand" onclick="goHome()">Media-Tiles</div>
  <div>Media-Lab Tools</div>
</div>

<!-- TOOL UI -->
<div class="container">

  <h2>GIF Motion Tool</h2>

  <label>Upload File</label>
  <input type="file" id="file">

  <label>Tool</label>
  <select id="tool">
    <option value="gif_motion">GIF Motion</option>
  </select>

  <label>Preset</label>
  <select id="preset">
    <option value="balanced_v1">Balanced</option>
    <option value="fluid_motion_v1">Fluid Motion</option>
  </select>

  <button onclick="runTool()">Run Tool</button>

  <div id="output"></div>
</div>

<script>

const API_URL = "https://media-lab.onrender.com/upload";

function goHome() {
  window.location.href = "https://guyititian.github.io/media-tiles/";
}

async function runTool() {
  const outputEl = document.getElementById("output");

  try {
    const file = document.getElementById("file").files[0];
    const tool = document.getElementById("tool").value;
    const preset = document.getElementById("preset").value;

    console.log("INPUT FILE:", file);
    console.log("INPUT TOOL:", tool);
    console.log("INPUT PRESET:", preset);

    if (!file) {
      outputEl.innerText = "Please select a file.";
      return;
    }

    outputEl.innerText = "Processing...";

    const formData = new FormData();
    formData.append("file", file);
    formData.append("tool", tool);
    formData.append("preset", preset);

    const res = await fetch(API_URL, {
      method: "POST",
      body: formData
    });

    console.log("STATUS:", res.status);
    console.log("OK:", res.ok);

    const raw = await res.text();
    console.log("RAW RESPONSE:", raw);

    let data;
    try {
      data = JSON.parse(raw);
    } catch (e) {
      console.error("JSON PARSE ERROR:", e);
      throw new Error("Invalid JSON from backend");
    }

    console.log("PARSED DATA:", data);

    if (!res.ok) {
      throw new Error(data.error || "Request failed");
    }

    if (!data.output_url) {
      throw new Error("Missing output_url");
    }

    const finalUrl = new URL(data.output_url, "https://media-lab.onrender.com").href;

    console.log("FINAL URL:", finalUrl);

    outputEl.innerHTML =
      `<a href="${finalUrl}" target="_blank">Download GIF</a>`;

  } catch (err) {
    console.error("FULL ERROR:", err);
    outputEl.innerText = "ERROR: " + err.message;
  }
}

</script>

</body>
</html>
