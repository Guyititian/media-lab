<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Media-Lab</title>

<style>
:root {
  --bg: #0b0f14;
  --panel: #121823;
  --panel-2: #0f141d;
  --text: #e8eef7;
  --muted: rgba(232, 238, 247, 0.6);
  --accent: #7aa2ff;
  --border: rgba(255,255,255,0.06);
  --shadow: 0 20px 60px rgba(0,0,0,0.55);
}

* { box-sizing: border-box; }

body {
  margin: 0;
  font-family: system-ui, -apple-system, Segoe UI, Arial;
  background: radial-gradient(1200px 800px at 50% 10%, #141b2a 0%, var(--bg) 60%);
  color: var(--text);
}

/* HEADER (ecosystem unified) */
.header {
  max-width:1100px;
  margin: 18px auto 0 auto;
  padding: 14px 18px;
  border-radius: 18px;
  background: linear-gradient(180deg, var(--panel), var(--panel-2));
  border: 1px solid var(--border);
  box-shadow: var(--shadow);

  display:flex;
  justify-content:space-between;
  align-items:center;
}

/* BRAND */
.brand {
  font-size: 32px;
  font-weight: 900;
  cursor: pointer;
  letter-spacing: 0.5px;
}

.brand span {
  color: var(--accent);
}

/* NAV SYSTEM (matches browse page) */
.ecosystem-nav {
  display:flex;
  gap:10px;
}

.nav-btn {
  padding:6px 10px;
  border-radius:10px;
  font-size:12px;
  border:1px solid var(--border);
  background: rgba(255,255,255,0.03);
  color: var(--muted);
  cursor:pointer;
  transition:0.2s;
}

.nav-btn:hover {
  transform: translateY(-2px);
  color: var(--text);
}

.nav-btn.active {
  background: rgba(122,162,255,0.15);
  border-color: rgba(122,162,255,0.35);
  color: var(--text);
  box-shadow: 0 0 18px rgba(122,162,255,0.15);
}

/* MAIN */
.container {
  max-width: 600px;
  margin: 40px auto;
  background: linear-gradient(180deg, rgba(255,255,255,0.04), rgba(255,255,255,0.02));
  border: 1px solid var(--border);
  padding: 20px;
  border-radius: 14px;
  box-shadow: var(--shadow);
}

/* INPUTS */
label {
  display: block;
  margin-top: 12px;
  font-size: 12px;
  opacity: 0.7;
}

input, button {
  width: 100%;
  margin-top: 6px;
  padding: 10px;
  border-radius: 8px;
  border: 1px solid var(--border);
  background: rgba(255,255,255,0.03);
  color: var(--text);
}

button {
  margin-top: 16px;
  background: rgba(122,162,255,0.15);
  border-color: rgba(122,162,255,0.35);
  cursor: pointer;
}

button:hover {
  box-shadow: 0 0 18px rgba(122,162,255,0.2);
}

/* STATUS */
#status {
  margin-top: 16px;
  font-size: 13px;
  opacity: 0.8;
}

/* LOADER */
.loader {
  margin-top: 12px;
  width: 18px;
  height: 18px;
  border: 3px solid #444;
  border-top: 3px solid white;
  border-radius: 50%;
  animation: spin 1s linear infinite;
  display: none;
}

@keyframes spin {
  100% { transform: rotate(360deg); }
}

/* PRESETS */
.presetGrid {
  display: grid;
  grid-template-columns: 1fr;
  gap: 10px;
  margin-top: 10px;
}

.presetCard {
  padding: 12px;
  border-radius: 10px;
  background: rgba(255,255,255,0.03);
  border: 1px solid var(--border);
  cursor: pointer;
  transition:0.2s;
}

.presetCard:hover {
  transform: translateY(-2px);
}

.presetCard.active {
  border-color: rgba(122,162,255,0.5);
  box-shadow: 0 0 18px rgba(122,162,255,0.15);
}

.presetTitle {
  font-weight: bold;
  margin-bottom: 4px;
}

.presetDesc {
  font-size: 12px;
  opacity: 0.7;
}

/* OUTPUT */
#output {
  margin-top: 16px;
  font-size: 14px;
  word-break: break-word;
}

.resultCard {
  margin-top: 12px;
  padding: 12px;
  background: rgba(255,255,255,0.03);
  border-radius: 10px;
  border: 1px solid var(--border);
}

a {
  color: var(--accent);
}

</style>
</head>

<body>

<!-- ✅ ECOSYSTEM HEADER (NEW, NON-DESTRUCTIVE) -->
<div class="header">

  <div class="brand" onclick="goHome()">
    <span>Media</span> Tiles
  </div>

  <div class="ecosystem-nav">
    <div class="nav-btn" onclick="window.location.href='https://guyititian.github.io/media-tiles/browse.html'">
      Library
    </div>

    <div class="nav-btn active">
      Tools
    </div>
  </div>

</div>

<div class="container">

  <h2>GIF Motion Tool</h2>

  <label>Upload File</label>
  <input type="file" id="file">

  <label>Preset</label>

  <div class="presetGrid">

    <div class="presetCard active" onclick="selectPreset('balanced_v1', this)">
      <div class="presetTitle">Balanced</div>
      <div class="presetDesc">Stable output. Clean motion, low artifacts.</div>
    </div>

    <div class="presetCard" onclick="selectPreset('fluid_motion_v1', this)">
      <div class="presetTitle">Fluid Motion</div>
      <div class="presetDesc">Smoother motion with stronger interpolation.</div>
    </div>

    <div class="presetCard" onclick="selectPreset('cinematic_v1', this)">
      <div class="presetTitle">Cinematic</div>
      <div class="presetDesc">High intensity visual motion + enhanced depth.</div>
    </div>

  </div>

  <input type="hidden" id="preset" value="balanced_v1">

  <button onclick="runTool()">Run Tool</button>

  <div class="loader" id="loader"></div>
  <div id="status"></div>
  <div id="output"></div>

</div>

<script>

const API_URL = "https://media-lab.onrender.com/upload";

function goHome() {
  window.location.href = "https://guyititian.github.io/media-tiles/";
}

/* PRESET SELECTOR */
function selectPreset(value, el) {
  document.getElementById("preset").value = value;

  document.querySelectorAll(".presetCard")
    .forEach(c => c.classList.remove("active"));

  el.classList.add("active");
}

/* PIPELINE (UNCHANGED) */
async function runTool() {
  const outputEl = document.getElementById("output");
  const statusEl = document.getElementById("status");
  const loader = document.getElementById("loader");

  try {
    const file = document.getElementById("file").files[0];
    const preset = document.getElementById("preset").value;
    const tool = "gif_motion";

    if (!file) {
      outputEl.innerText = "Please select a file.";
      return;
    }

    outputEl.innerHTML = "";
    statusEl.innerText = "Processing...";
    loader.style.display = "block";

    const formData = new FormData();
    formData.append("file", file);
    formData.append("tool", tool);
    formData.append("preset", preset);

    const res = await fetch(API_URL, {
      method: "POST",
      body: formData
    });

    const raw = await res.text();
    let data = JSON.parse(raw);

    const urlPart =
      data.output_url || data?.data?.output_url || data?.url;

    const finalUrl = new URL(urlPart, "https://media-lab.onrender.com").href;

    loader.style.display = "none";
    statusEl.innerText = "Complete ✔";

    outputEl.innerHTML = `
      <div class="resultCard">
        <div>Output ready</div>
        <a href="${finalUrl}" target="_blank">Download GIF</a>
      </div>
    `;

  } catch (err) {
    loader.style.display = "none";
    statusEl.innerText = "";
    outputEl.innerText = "ERROR: " + err.message;
  }
}

</script>

</body>
</html>
