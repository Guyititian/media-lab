<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Media Lab</title>

<style>
body {
  margin:0;
  background:#0f0f0f;
  color:white;
  font-family:Arial;
}

/* HEADER */
.header {
  display:flex;
  justify-content:space-between;
  padding:20px 30px;
  background:#111;
  border-bottom:1px solid #222;
}

.brand {
  font-weight:bold;
  cursor:pointer;
}

.brand:hover { opacity:0.7; }

/* TOOL GRID */
.tools {
  display:flex;
  gap:15px;
  padding:20px;
  justify-content:center;
}

.tool-card {
  background:#1c1c1c;
  padding:15px;
  border-radius:10px;
  cursor:pointer;
  width:180px;
  text-align:center;
  transition:0.2s;
}

.tool-card:hover {
  background:#252525;
}

.tool-card.active {
  outline:2px solid white;
}

/* PANEL */
.panel {
  max-width:520px;
  margin:20px auto;
  background:#1c1c1c;
  padding:20px;
  border-radius:12px;
}

label {
  font-size:12px;
  opacity:0.7;
  margin-top:10px;
  display:block;
}

input, select, button {
  width:100%;
  padding:10px;
  margin-top:8px;
  border:none;
  border-radius:6px;
}

button {
  background:white;
  color:black;
  cursor:pointer;
}

#output {
  margin-top:15px;
  font-size:12px;
  word-break:break-all;
}

/* HELP */
.help {
  font-size:12px;
  cursor:pointer;
  opacity:0.6;
}

.help:hover { opacity:1; }

/* MODAL */
.modal {
  position:fixed;
  width:100%;
  height:100%;
  background:rgba(0,0,0,0.7);
  display:none;
  justify-content:center;
  align-items:center;
}

.modal-content {
  background:#1c1c1c;
  padding:20px;
  border-radius:10px;
  max-width:420px;
}

.close {
  float:right;
  cursor:pointer;
}
</style>
</head>

<body>

<!-- HEADER -->
<div class="header">
  <div class="brand" onclick="goHome()">Media-Tiles</div>
  <div>Media-Lab Dashboard</div>
</div>

<!-- TOOL SELECTOR -->
<div class="tools">
  <div class="tool-card active" onclick="selectTool('gif_motion')" id="tool_gif_motion">
    GIF Motion
  </div>
</div>

<!-- CONFIG PANEL -->
<div class="panel">

  <h3 id="toolTitle">GIF Motion</h3>

  <label>Upload File</label>
  <input type="file" id="file">

  <label>Preset <span class="help" onclick="openModal()">?</span></label>

  <select id="preset">
    <option value="balanced">Balanced</option>
    <option value="fluid_motion">Fluid Motion</option>
  </select>

  <button onclick="runTool()">Run Tool</button>

  <div id="output"></div>

</div>

<!-- MODAL -->
<div class="modal" id="modal">
  <div class="modal-content">
    <span class="close" onclick="closeModal()">✕</span>

    <h3>Preset Guide</h3>

    <p><b>Balanced</b><br>Stable motion and optimized file size.</p>
    <p><b>Fluid Motion</b><br>Smoother motion using interpolation.</p>

  </div>
</div>

<script>
let currentTool = "gif_motion";

function goHome() {
  window.location.href = "https://guyititian.github.io/media-tiles/";
}

function selectTool(tool) {
  currentTool = tool;

  document.querySelectorAll(".tool-card")
    .forEach(el => el.classList.remove("active"));

  document.getElementById("tool_" + tool).classList.add("active");

  document.getElementById("toolTitle").innerText = "GIF Motion";
}

function openModal() {
  document.getElementById("modal").style.display = "flex";
}

function closeModal() {
  document.getElementById("modal").style.display = "none";
}

const API_URL = "https://media-lab.onrender.com/upload";

async function runTool() {
  const file = document.getElementById("file").files[0];
  const presetUI = document.getElementById("preset").value;

  if (!file) {
    document.getElementById("output").innerText = "Select a file.";
    return;
  }

  document.getElementById("output").innerText = "Processing...";

  /* =====================================================
     CRITICAL: MATCH BACKEND PRESET KEYS EXACTLY
  ===================================================== */
  const presetMap = {
    balanced: "balanced_v1",
    fluid_motion: "fluid_motion_v1"
  };

  const formData = new FormData();
  formData.append("file", file);
  formData.append("tool", currentTool);
  formData.append("preset", presetMap[presetUI]);

  try {
    const res = await fetch(API_URL, {
      method: "POST",
      body: formData
    });

    /* FORCE TEXT FIRST (prevents silent JSON parse failures) */
    const text = await res.text();

    console.log("RAW RESPONSE:", text);

    let data;
    try {
      data = JSON.parse(text);
    } catch (e) {
      throw new Error("Invalid JSON from server: " + text);
    }

    if (!res.ok || data.error) {
      throw new Error(data.error || "Server error");
    }

    const downloadUrl =
      "https://media-lab.onrender.com" + data.output_url;

    document.getElementById("output").innerHTML =
      "<a href='" + downloadUrl + "' target='_blank'>Download Output</a>";

  } catch (e) {
    document.getElementById("output").innerText =
      "Error: " + e.message;

    console.error(e);
  }
}
</script>

</body>
</html>
