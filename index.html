<script>

const API_URL = "https://media-lab.onrender.com/upload";

async function runTool() {
  const file = document.getElementById("file").files[0];
  const preset = document.getElementById("preset").value;

  if (!file) {
    document.getElementById("output").innerText = "Please select a file.";
    return;
  }

  document.getElementById("output").innerText = "Processing...";

  console.log("🔥 FRONTEND PRESET SENDING:", preset);

  const formData = new FormData();

  // 🔥 HARD GUARANTEE FIELD NAMES
  formData.append("file", file);
  formData.append("preset", preset);

  try {
    const res = await fetch(API_URL, {
      method: "POST",
      body: formData
    });

    const text = await res.text();
    console.log("🔥 RAW RESPONSE:", text);

    const data = JSON.parse(text);

    if (data.error) {
      throw new Error(JSON.stringify(data));
    }

    const downloadUrl =
      "https://media-lab.onrender.com" + data.download_url;

    document.getElementById("output").innerHTML =
      "Output: <a href='" + downloadUrl + "' target='_blank'>Download GIF</a>";

  } catch (e) {
    document.getElementById("output").innerText =
      "Error: " + e.message;
  }
}

</script>
