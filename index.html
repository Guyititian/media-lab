<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Media-Lab</title>

<style>
:root {
  --bg: #0b0f14;
  --panel: #121823;
  --panel-2: #0f141d;
  --text: #e8eef7;
  --muted: rgba(232, 238, 247, 0.6);
  --accent: #7aa2ff;
  --border: rgba(255,255,255,0.06);
  --shadow: 0 20px 60px rgba(0,0,0,0.55);
}

* { box-sizing: border-box; }

body {
  margin:0;
  font-family: system-ui, -apple-system, Segoe UI, Arial;
  color: var(--text);
  background: radial-gradient(1200px 800px at 50% 10%, #141b2a 0%, var(--bg) 60%);
}

.page { padding: 28px; }

.header {
  max-width: 1100px;
  margin: 0 auto 18px auto;
  background: linear-gradient(180deg, var(--panel), var(--panel-2));
  border: 1px solid var(--border);
  border-radius: 18px;
  padding: 18px 22px;
  box-shadow: var(--shadow);
}

.brand-row {
  display:flex;
  align-items:center;
  justify-content:space-between;
  padding: 10px 12px;
  border-radius: 14px;
  background: rgba(255,255,255,0.02);
  border: 1px solid rgba(255,255,255,0.04);
  margin-bottom: 14px;
}

.brand {
  font-size: 30px;
  font-weight: 900;
  letter-spacing: 0.5px;
  cursor: pointer;
  display:flex;
  align-items:center;
  gap:10px;
}

.brand span { color: var(--accent); }

.ecosystem-nav { display:flex; gap:10px; }

.nav-btn {
  padding:6px 10px;
  border-radius:10px;
  font-size:12px;
  border:1px solid var(--border);
  background: rgba(255,255,255,0.03);
  color: var(--muted);
  cursor:pointer;
  transition:0.2s;
}

.nav-btn:hover {
  transform: translateY(-2px);
  color: var(--text);
}

.nav-btn.active {
  background: rgba(122,162,255,0.15);
  border-color: rgba(122,162,255,0.35);
  color: var(--text);
}

.container {
  max-width: 1100px;
  margin: 0 auto;
  background: linear-gradient(180deg, var(--panel), var(--panel-2));
  border: 1px solid var(--border);
  border-radius: 18px;
  padding: 22px;
  box-shadow: var(--shadow);
}

h2 { font-size: 18px; margin: 0 0 14px 0; }

label {
  display:block;
  margin-top:14px;
  font-size:12px;
  color: var(--muted);
}

input, button {
  width:100%;
  padding:12px 14px;
  margin-top:6px;
  border-radius:12px;
  border:1px solid var(--border);
  background: rgba(255,255,255,0.03);
  color: var(--text);
}

button {
  margin-top:16px;
  background: rgba(122,162,255,0.15);
  border-color: rgba(122,162,255,0.35);
  cursor:pointer;
}

button:hover { transform: translateY(-2px); }

.presetGrid {
  display:grid;
  gap:12px;
  margin-top:10px;
}

.presetCard {
  padding:14px;
  border-radius:14px;
  background: linear-gradient(180deg, rgba(255,255,255,0.04), rgba(255,255,255,0.02));
  border:1px solid var(--border);
  cursor:pointer;
  transition:0.25s;
}

.presetCard:hover { transform: translateY(-4px); }

.presetCard.active {
  border-color: rgba(122,162,255,0.5);
}

.presetTitle { font-size:14px; font-weight:700; }
.presetDesc { font-size:12px; color: var(--muted); }

#status { margin-top:14px; font-size:13px; }
#output { margin-top:14px; }

.loader {
  margin-top:12px;
  width:18px;
  height:18px;
  border:3px solid #444;
  border-top:3px solid white;
  border-radius:50%;
  animation: spin 1s linear infinite;
  display:none;
}

@keyframes spin { 100% { transform: rotate(360deg); } }

a { color: var(--accent); }
</style>
</head>

<body>

<div class="page">

<div class="header">
<div class="brand-row">

<div class="brand" onclick="goHome()">
<span>Media</span> Tiles
</div>

<div class="ecosystem-nav">
<div class="nav-btn" onclick="window.location.href='https://guyititian.github.io/media-tiles/browse.html'">Library</div>
<div class="nav-btn active">Tools</div>
</div>

</div>
</div>

<div class="container">

<h2>GIF Motion Tool</h2>

<label>Upload File</label>
<input type="file" id="file">

<label>Preset</label>

<div class="presetGrid" id="presetGrid"></div>

<input type="hidden" id="preset">

<button onclick="runTool()">Run Tool</button>

<div class="loader" id="loader"></div>
<div id="status"></div>
<div id="output"></div>

</div>
</div>

<script>

const API_BASE = "https://media-lab.onrender.com";

function goHome() {
  window.location.href = "https://guyititian.github.io/media-tiles/";
}

let currentPreset = null;

async function loadPresets() {
  const res = await fetch(API_BASE + "/tools");
  const data = await res.json();

  const presets = data.tools.gif_motion.presets;
  const grid = document.getElementById("presetGrid");

  grid.innerHTML = "";

  Object.entries(presets).forEach(([key, p], index) => {
    const card = document.createElement("div");
    card.className = "presetCard";
    if (index === 0) {
      card.classList.add("active");
      currentPreset = key;
      document.getElementById("preset").value = key;
    }

    card.innerHTML = `
      <div class="presetTitle">${p.label}</div>
      <div class="presetDesc">${p.description}</div>
    `;

    card.onclick = () => {
      document.querySelectorAll(".presetCard").forEach(c => c.classList.remove("active"));
      card.classList.add("active");
      currentPreset = key;
      document.getElementById("preset").value = key;
    };

    grid.appendChild(card);
  });
}

async function runTool() {
  const file = document.getElementById("file").files[0];
  if (!file) return alert("Select a file");

  const loader = document.getElementById("loader");
  const status = document.getElementById("status");
  const output = document.getElementById("output");

  loader.style.display = "block";
  status.innerText = "Processing...";
  output.innerHTML = "";

  const form = new FormData();
  form.append("file", file);
  form.append("tool", "gif_motion");
  form.append("preset", currentPreset);

  try {
    const res = await fetch(API_BASE + "/upload", { method: "POST", body: form });
    const data = await res.json();

    const url = API_BASE + data.output_url;

    loader.style.display = "none";
    status.innerText = "Complete ✔";

    output.innerHTML = `
      <div class="resultCard">
        <a href="${url}" target="_blank">Download GIF</a>
      </div>
    `;

  } catch (e) {
    loader.style.display = "none";
    status.innerText = "Error";
  }
}

loadPresets();

</script>

</body>
</html>
