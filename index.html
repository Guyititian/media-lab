<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Media-Lab</title>

<style>
:root {
  --bg: #0b0f14;
  --panel: #121823;
  --panel-2: #0f141d;
  --text: #e8eef7;
  --muted: rgba(232, 238, 247, 0.6);
  --accent: #7aa2ff;
  --border: rgba(255,255,255,0.06);
  --shadow: 0 20px 60px rgba(0,0,0,0.55);
}

* { box-sizing: border-box; }

body {
  margin:0;
  font-family: system-ui, -apple-system, Segoe UI, Arial;
  color: var(--text);
  background: radial-gradient(1200px 800px at 50% 10%, #141b2a 0%, var(--bg) 60%);
}

/* PAGE WRAP */
.page {
  padding: 28px;
}

/* =========================
   ECOSYSTEM HEADER
========================= */

.header {
  max-width: 1100px;
  margin: 0 auto 18px auto;
  background: linear-gradient(180deg, var(--panel), var(--panel-2));
  border: 1px solid var(--border);
  border-radius: 18px;
  padding: 18px 22px;
  box-shadow: var(--shadow);
}

/* BRAND ROW */
.brand-row {
  display:flex;
  align-items:center;
  justify-content:space-between;
  padding: 10px 12px;
  border-radius: 14px;
  background: rgba(255,255,255,0.02);
  border: 1px solid rgba(255,255,255,0.04);
  margin-bottom: 14px;
}

/* BRAND */
.brand {
  font-size: 30px;
  font-weight: 900;
  letter-spacing: 0.5px;
  cursor: pointer;
  display:flex;
  align-items:center;
  gap:10px;
}

.brand span {
  color: var(--accent);
}

/* NAV SYSTEM (NOW SYMMETRICAL) */
.ecosystem-nav {
  display:flex;
  gap:10px;
}

.nav-btn {
  padding:6px 10px;
  border-radius:10px;
  font-size:12px;
  border:1px solid var(--border);
  background: rgba(255,255,255,0.03);
  color: var(--muted);
  cursor:pointer;
  transition:0.2s;
}

.nav-btn:hover {
  transform: translateY(-2px);
  color: var(--text);
}

.nav-btn.active {
  background: rgba(122,162,255,0.15);
  border-color: rgba(122,162,255,0.35);
  color: var(--text);
  box-shadow: 0 10px 30px rgba(122,162,255,0.08);
}

/* =========================
   TOOL PANEL
========================= */

.container {
  max-width: 1100px;
  margin: 0 auto;
  background: linear-gradient(180deg, var(--panel), var(--panel-2));
  border: 1px solid var(--border);
  border-radius: 18px;
  padding: 22px;
  box-shadow: var(--shadow);
}

h2 {
  font-size: 18px;
  margin: 0 0 14px 0;
  letter-spacing: 0.3px;
}

label {
  display:block;
  margin-top:14px;
  font-size:12px;
  color: var(--muted);
}

input, button {
  width:100%;
  padding:12px 14px;
  margin-top:6px;
  border-radius:12px;
  border:1px solid var(--border);
  background: rgba(255,255,255,0.03);
  color: var(--text);
  outline:none;
}

/* PRIMARY BUTTON */
button {
  margin-top:16px;
  background: rgba(122,162,255,0.15);
  border-color: rgba(122,162,255,0.35);
  cursor:pointer;
  transition:0.2s;
}

button:hover {
  transform: translateY(-2px);
}

button:disabled {
  opacity: 0.55;
  cursor: not-allowed;
  transform: none;
}

/* PRESETS */
.presetGrid {
  display:grid;
  gap:12px;
  margin-top:10px;
}

.presetCard {
  padding:14px;
  border-radius:14px;
  background: linear-gradient(180deg, rgba(255,255,255,0.04), rgba(255,255,255,0.02));
  border:1px solid var(--border);
  cursor:pointer;
  transition:0.25s;
  box-shadow: 0 10px 30px rgba(0,0,0,0.25);
}

.presetCard:hover {
  transform: translateY(-4px);
  border-color: rgba(122,162,255,0.25);
}

.presetCard.active {
  border-color: rgba(122,162,255,0.5);
  box-shadow: 0 0 0 1px rgba(122,162,255,0.15), 0 18px 60px rgba(0,0,0,0.55);
}

.presetTitle {
  font-size:14px;
  font-weight:700;
  margin-bottom:4px;
}

.presetDesc {
  font-size:12px;
  color: var(--muted);
}

/* STATUS */
#status {
  margin-top:14px;
  font-size:13px;
  color: var(--muted);
}

#output {
  margin-top:14px;
  font-size:14px;
}

.resultCard {
  margin-top:12px;
  padding:14px;
  border-radius:14px;
  background: rgba(255,255,255,0.03);
  border:1px solid var(--border);
}

/* LOADER */
.loader {
  margin-top:12px;
  width:18px;
  height:18px;
  border:3px solid #444;
  border-top:3px solid white;
  border-radius:50%;
  animation: spin 1s linear infinite;
  display:none;
}

@keyframes spin {
  100% { transform: rotate(360deg); }
}

a { color: var(--accent); }

</style>
</head>

<body>

<div class="page">

  <div class="header">

    <div class="brand-row">

      <div class="brand" onclick="goHome()">
        <span>Media</span> Tiles
      </div>

      <!-- FIXED NAV (SYMMETRICAL + CORRECT ROUTING) -->
      <div class="ecosystem-nav">

        <div class="nav-btn"
             onclick="window.location.href='https://guyititian.github.io/media-tiles/browse.html'">
          Library
        </div>

        <div class="nav-btn active"
             onclick="window.location.href='https://guyititian.github.io/media-lab/'">
          Tools
        </div>

      </div>

    </div>

  </div>

  <div class="container">

    <h2>GIF Motion Tool</h2>

    <label>Upload File</label>
    <input
      type="file"
      id="file"
      accept=".mp4,.mov,.mkv,.webm,.avi,.gif,.png,.jpg,.jpeg,.webp"
    >

    <label>Preset</label>

    <div class="presetGrid" id="presetGrid">

      <div class="presetCard active">
        <div class="presetTitle">Loading presets...</div>
        <div class="presetDesc">Connecting to Media-Lab backend.</div>
      </div>

    </div>

    <input type="hidden" id="preset" value="">

    <button id="runButton" onclick="runTool()" disabled>Run Tool</button>

    <div class="loader" id="loader"></div>
    <div id="status"></div>
    <div id="output"></div>

  </div>

</div>

<script>
const API_BASE = "https://media-lab.onrender.com";
const API_UPLOAD_URL = API_BASE + "/upload";
const API_TOOLS_URL = API_BASE + "/tools";

function goHome() {
  window.location.href = "https://guyititian.github.io/media-tiles/";
}

function selectPreset(value, el) {
  document.getElementById("preset").value = value;

  document.querySelectorAll(".presetCard")
    .forEach(c => c.classList.remove("active"));

  el.classList.add("active");
}

async function loadPresets() {
  const grid = document.getElementById("presetGrid");
  const runButton = document.getElementById("runButton");
  const statusEl = document.getElementById("status");

  try {
    const res = await fetch(API_TOOLS_URL, { cache: "no-store" });
    const data = await res.json();

    if (!res.ok || !data.success || !data.tools || !data.tools.gif_motion) {
      throw new Error(data.detail || "Could not load GIF Motion presets.");
    }

    const presets = data.tools.gif_motion.presets || {};
    const entries = Object.entries(presets);

    if (entries.length === 0) {
      throw new Error("No presets were returned by the backend.");
    }

    grid.innerHTML = "";

    entries.forEach(([key, preset], index) => {
      const card = document.createElement("div");
      card.className = "presetCard";

      if (index === 0) {
        card.classList.add("active");
        document.getElementById("preset").value = key;
      }

      card.onclick = function() {
        selectPreset(key, card);
      };

      const title = document.createElement("div");
      title.className = "presetTitle";
      title.textContent = preset.label || key;

      const desc = document.createElement("div");
      desc.className = "presetDesc";
      desc.textContent = preset.description || "";

      card.appendChild(title);
      card.appendChild(desc);
      grid.appendChild(card);
    });

    runButton.disabled = false;
    statusEl.innerText = "";

  } catch (err) {
    grid.innerHTML = `
      <div class="presetCard active">
        <div class="presetTitle">Presets unavailable</div>
        <div class="presetDesc">${err.message}</div>
      </div>
    `;
    runButton.disabled = true;
    statusEl.innerText = "Unable to load presets.";
  }
}

async function pollJob(jobId) {
  const outputEl = document.getElementById("output");
  const statusEl = document.getElementById("status");
  const loader = document.getElementById("loader");
  const runButton = document.getElementById("runButton");

  const maxAttempts = 240;
  let attempts = 0;

  const interval = setInterval(async () => {
    attempts++;

    try {
      const res = await fetch(`${API_BASE}/jobs/${jobId}`, { cache: "no-store" });
      const data = await res.json();

      if (!res.ok || !data.success) {
        throw new Error(data.detail || "Could not read job status.");
      }

      const job = data.job;

      if (job.status === "queued") {
        statusEl.innerText = "Queued...";
      }

      if (job.status === "processing") {
        statusEl.innerText = "Processing...";
      }

      if (job.status === "complete") {
        clearInterval(interval);

        loader.style.display = "none";
        runButton.disabled = false;
        statusEl.innerText = "Complete ✔";

        if (!job.output_url) {
          outputEl.innerText = "ERROR: Job completed but no output URL was returned.";
          return;
        }

        const finalUrl = new URL(job.output_url, API_BASE).href;

        outputEl.innerHTML = `
          <div class="resultCard">
            <div>Output ready</div>
            <a href="${finalUrl}" target="_blank" rel="noopener noreferrer">Download GIF</a>
          </div>
        `;
      }

      if (job.status === "error") {
        clearInterval(interval);

        loader.style.display = "none";
        runButton.disabled = false;
        statusEl.innerText = "";
        outputEl.innerText = "ERROR: " + (job.error || "Processing failed.");
      }

      if (attempts >= maxAttempts) {
        clearInterval(interval);

        loader.style.display = "none";
        runButton.disabled = false;
        statusEl.innerText = "";
        outputEl.innerText = "ERROR: Job status timed out.";
      }

    } catch (err) {
      clearInterval(interval);

      loader.style.display = "none";
      runButton.disabled = false;
      statusEl.innerText = "";
      outputEl.innerText = "ERROR: " + err.message;
    }
  }, 2000);
}

async function runTool() {
  const outputEl = document.getElementById("output");
  const statusEl = document.getElementById("status");
  const loader = document.getElementById("loader");
  const runButton = document.getElementById("runButton");

  try {
    const file = document.getElementById("file").files[0];
    const preset = document.getElementById("preset").value;

    if (!file) {
      outputEl.innerText = "Please select a file.";
      return;
    }

    if (!preset) {
      outputEl.innerText = "Please select a preset.";
      return;
    }

    outputEl.innerHTML = "";
    statusEl.innerText = "Uploading...";
    loader.style.display = "block";
    runButton.disabled = true;

    const formData = new FormData();
    formData.append("file", file);
    formData.append("tool", "gif_motion");
    formData.append("preset", preset);

    const res = await fetch(API_UPLOAD_URL, {
      method: "POST",
      body: formData
    });

    const data = await res.json();

    if (!res.ok || !data.success || !data.job_id) {
      throw new Error(data.detail || data.error || "Upload failed.");
    }

    statusEl.innerText = "Queued...";
    pollJob(data.job_id);

  } catch (err) {
    loader.style.display = "none";
    runButton.disabled = false;
    statusEl.innerText = "";
    outputEl.innerText = "ERROR: " + err.message;
  }
}

loadPresets();
</script>

</body>
</html>
