<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Media Lab</title>

<style>
body {
  margin:0;
  background:#0f0f0f;
  color:white;
  font-family:Arial;
}

.header {
  text-align:center;
  padding:30px;
}

.header h1 {
  margin:0;
  font-size:26px;
}

.header p {
  opacity:0.6;
  font-size:13px;
}

.panel {
  max-width:520px;
  margin:40px auto;
  background:#1c1c1c;
  padding:20px;
  border-radius:12px;
}

label {
  font-size:12px;
  opacity:0.7;
  display:block;
  margin-top:10px;
}

input, select, button {
  width:100%;
  padding:10px;
  margin-top:8px;
  border:none;
  border-radius:6px;
}

button {
  background:white;
  color:black;
  cursor:pointer;
}

button:hover {
  opacity:0.85;
}

#output {
  margin-top:15px;
  font-size:12px;
  opacity:0.85;
  word-break:break-all;
}

a {
  color:#7dd3fc;
}
</style>
</head>

<body>

<div class="header">
  <h1>🛠 Media Lab</h1>
  <p>Upload MP4 → select preset → generate GIF</p>
</div>

<div class="panel">

  <label>Upload File</label>
  <input type="file" id="file">

  <label>Tool</label>
  <select id="tool">
    <option value="gif_motion">GIF Motion</option>
  </select>

  <label>Preset</label>
  <select id="preset">
    <option value="balanced">Balanced</option>
    <option value="fluid_motion">Fluid Motion</option>
  </select>

  <button onclick="runTool()">Generate</button>

  <div id="output"></div>

</div>

<script>
const API_URL = "https://media-lab.onrender.com/upload";

async function runTool() {
  const file = document.getElementById("file").files[0];
  const tool = document.getElementById("tool").value;
  const preset = document.getElementById("preset").value;

  if (!file) {
    document.getElementById("output").innerText = "Please select a file.";
    return;
  }

  document.getElementById("output").innerText = "Processing...";

  const formData = new FormData();
  formData.append("file", file);
  formData.append("tool", tool);
  formData.append("preset", preset);

  try {
    const res = await fetch(API_URL, {
      method: "POST",
      body: formData
    });

    const data = await res.json();

    if (!data.output_url) {
      document.getElementById("output").innerText =
        "Error: No output returned";
      return;
    }

    document.getElementById("output").innerHTML =
      "Output: <a href='" + data.output_url + "' target='_blank'>Download GIF</a>";

  } catch (e) {
    document.getElementById("output").innerText =
      "Error: " + e.message;
  }
}
</script>

</body>
</html>
