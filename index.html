<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Media Lab</title>

<style>
body {
  margin:0;
  background:#0f0f0f;
  color:white;
  font-family:Arial;
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
}

.container {
  width:420px;
  text-align:left;
}

h1 {
  font-size:26px;
  margin-bottom:10px;
}

.sub {
  opacity:0.6;
  margin-bottom:20px;
  font-size:13px;
}

.card {
  background:#1c1c1c;
  padding:16px;
  border-radius:12px;
  margin-bottom:12px;
}

input, select, button {
  width:100%;
  margin-top:8px;
  padding:10px;
  border:none;
  border-radius:6px;
  font-size:14px;
}

button {
  background:white;
  color:black;
  cursor:pointer;
}

button:hover {
  opacity:0.85;
}

#output {
  margin-top:16px;
  font-size:12px;
  opacity:0.7;
  word-break:break-all;
}
</style>
</head>

<body>

<div class="container">

  <h1>🛠 Media Lab</h1>
  <div class="sub">Bring your own media → process → download</div>

  <div class="card">

    <label>Image URL</label>
    <input id="imageUrl" placeholder="Paste image URL">

    <label>Tool</label>
    <select id="tool">
      <option value="gif_motion">GIF Motion</option>
    </select>

    <button onclick="runTool()">Generate</button>

    <div id="output"></div>

  </div>

</div>

<script>
async function runTool() {
  const image_url = document.getElementById("imageUrl").value;
  const tool = document.getElementById("tool").value;

  document.getElementById("output").innerText = "Processing...";

  try {
    const res = await fetch("/api/run", {
      method: "POST",
      headers: {"Content-Type":"application/json"},
      body: JSON.stringify({
        tool: tool,
        input: { image_url }
      })
    });

    const data = await res.json();

    document.getElementById("output").innerText =
      "Output: " + (data.output_url || JSON.stringify(data));

  } catch (err) {
    document.getElementById("output").innerText =
      "Error: " + err.message;
  }
}
</script>

</body>
</html>
