<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Media-Lab</title>

<style>
:root {
  --bg: #0b0f14;
  --panel: #121823;
  --panel-2: #0f141d;
  --text: #e8eef7;
  --muted: rgba(232, 238, 247, 0.6);
  --accent: #7aa2ff;
  --border: rgba(255,255,255,0.06);
  --shadow: 0 20px 60px rgba(0,0,0,0.55);
}

* { box-sizing: border-box; }

body {
  margin:0;
  font-family: system-ui, -apple-system, Segoe UI, Arial;
  color: var(--text);
  background: radial-gradient(1200px 800px at 50% 10%, #141b2a 0%, var(--bg) 60%);
}

/* PAGE WRAP */
.page {
  padding: 28px;
}

/* =========================
   ECOSYSTEM HEADER (MATCH LIBRARY)
========================= */

.header {
  max-width: 1100px;
  margin: 0 auto 18px auto;
  background: linear-gradient(180deg, var(--panel), var(--panel-2));
  border: 1px solid var(--border);
  border-radius: 18px;
  padding: 18px 22px;
  box-shadow: var(--shadow);
}

/* BRAND ROW */
.brand-row {
  display:flex;
  align-items:center;
  justify-content:space-between;
  padding: 10px 12px;
  border-radius: 14px;
  background: rgba(255,255,255,0.02);
  border: 1px solid rgba(255,255,255,0.04);
  margin-bottom: 14px;
}

/* BRAND (MATCH LIBRARY SCALE) */
.brand {
  font-size: 30px;
  font-weight: 900;
  letter-spacing: 0.5px;
  cursor: pointer;
  display:flex;
  align-items:center;
  gap:10px;
}

.brand span {
  color: var(--accent);
}

/* NAV SYSTEM (LIBRARY PARITY) */
.ecosystem-nav {
  display:flex;
  gap:10px;
}

.nav-btn {
  padding:6px 10px;
  border-radius:10px;
  font-size:12px;
  border:1px solid var(--border);
  background: rgba(255,255,255,0.03);
  color: var(--muted);
  cursor:pointer;
  transition:0.2s;
}

.nav-btn:hover {
  transform: translateY(-2px);
  color: var(--text);
}

.nav-btn.active {
  background: rgba(122,162,255,0.15);
  border-color: rgba(122,162,255,0.35);
  color: var(--text);
  box-shadow: 0 10px 30px rgba(122,162,255,0.08);
}

/* =========================
   MAIN TOOL PANEL
========================= */

.container {
  max-width: 1100px;
  margin: 0 auto;
  background: linear-gradient(180deg, var(--panel), var(--panel-2));
  border: 1px solid var(--border);
  border-radius: 18px;
  padding: 22px;
  box-shadow: var(--shadow);
}

/* TITLE */
h2 {
  font-size: 18px;
  margin: 0 0 14px 0;
  letter-spacing: 0.3px;
}

/* INPUTS */
label {
  display:block;
  margin-top:14px;
  font-size:12px;
  color: var(--muted);
}

input, button {
  width:100%;
  padding:12px 14px;
  margin-top:6px;
  border-radius:12px;
  border:1px solid var(--border);
  background: rgba(255,255,255,0.03);
  color: var(--text);
  outline:none;
}

/* BUTTON PRIMARY */
button {
  margin-top:16px;
  background: rgba(122,162,255,0.15);
  border-color: rgba(122,162,255,0.35);
  cursor:pointer;
  transition:0.2s;
}

button:hover {
  transform: translateY(-2px);
}

/* =========================
   PRESET GRID (NOW MATCHES TILES)
========================= */

.presetGrid {
  display:grid;
  gap:12px;
  margin-top:10px;
}

.presetCard {
  padding:14px;
  border-radius:14px;
  background: linear-gradient(180deg, rgba(255,255,255,0.04), rgba(255,255,255,0.02));
  border:1px solid var(--border);
  cursor:pointer;
  transition:0.25s;
  box-shadow: 0 10px 30px rgba(0,0,0,0.25);
}

.presetCard:hover {
  transform: translateY(-4px);
  border-color: rgba(122,162,255,0.25);
  box-shadow: 0 18px 50px rgba(0,0,0,0.45);
}

.presetCard.active {
  border-color: rgba(122,162,255,0.5);
  box-shadow: 0 0 0 1px rgba(122,162,255,0.15), 0 18px 60px rgba(0,0,0,0.55);
}

.presetTitle {
  font-size:14px;
  font-weight:700;
  margin-bottom:4px;
}

.presetDesc {
  font-size:12px;
  color: var(--muted);
}

/* STATUS + OUTPUT */
#status {
  margin-top:14px;
  font-size:13px;
  color: var(--muted);
}

#output {
  margin-top:14px;
  font-size:14px;
}

.resultCard {
  margin-top:12px;
  padding:14px;
  border-radius:14px;
  background: rgba(255,255,255,0.03);
  border:1px solid var(--border);
}

/* LOADER */
.loader {
  margin-top:12px;
  width:18px;
  height:18px;
  border:3px solid #444;
  border-top:3px solid white;
  border-radius:50%;
  animation: spin 1s linear infinite;
  display:none;
}

@keyframes spin {
  100% { transform: rotate(360deg); }
}

a { color: var(--accent); }

</style>
</head>

<body>

<div class="page">

  <!-- ECOSYSTEM HEADER -->
  <div class="header">

    <div class="brand-row">

      <div class="brand" onclick="goHome()">
        <span>Media</span> Tiles
      </div>

      <div class="ecosystem-nav">
        <div class="nav-btn" onclick="goHome()">Library</div>
        <div class="nav-btn active">Tools</div>
      </div>

    </div>

  </div>

  <!-- TOOL PANEL -->
  <div class="container">

    <h2>GIF Motion Tool</h2>

    <label>Upload File</label>
    <input type="file" id="file">

    <label>Preset</label>

    <div class="presetGrid">

      <div class="presetCard active" onclick="selectPreset('balanced_v1', this)">
        <div class="presetTitle">Balanced</div>
        <div class="presetDesc">Stable output. Clean motion, low artifacts.</div>
      </div>

      <div class="presetCard" onclick="selectPreset('fluid_motion_v1', this)">
        <div class="presetTitle">Fluid Motion</div>
        <div class="presetDesc">Smoother motion with stronger interpolation.</div>
      </div>

      <div class="presetCard" onclick="selectPreset('cinematic_v1', this)">
        <div class="presetTitle">Cinematic</div>
        <div class="presetDesc">High intensity visual motion + enhanced depth.</div>
      </div>

    </div>

    <input type="hidden" id="preset" value="balanced_v1">

    <button onclick="runTool()">Run Tool</button>

    <div class="loader" id="loader"></div>
    <div id="status"></div>
    <div id="output"></div>

  </div>

</div>

<script>

const API_URL = "https://media-lab.onrender.com/upload";

function goHome() {
  window.location.href = "https://guyititian.github.io/media-tiles/";
}

/* PRESET SELECTOR (UNCHANGED FUNCTIONALITY) */
function selectPreset(value, el) {
  document.getElementById("preset").value = value;

  document.querySelectorAll(".presetCard")
    .forEach(c => c.classList.remove("active"));

  el.classList.add("active");
}

/* TOOL LOGIC (UNCHANGED) */
async function runTool() {
  const outputEl = document.getElementById("output");
  const statusEl = document.getElementById("status");
  const loader = document.getElementById("loader");

  try {
    const file = document.getElementById("file").files[0];
    const preset = document.getElementById("preset").value;

    if (!file) {
      outputEl.innerText = "Please select a file.";
      return;
    }

    outputEl.innerHTML = "";
    statusEl.innerText = "Processing...";
    loader.style.display = "block";

    const formData = new FormData();
    formData.append("file", file);
    formData.append("tool", "gif_motion");
    formData.append("preset", preset);

    const res = await fetch(API_URL, {
      method: "POST",
      body: formData
    });

    const raw = await res.text();
    let data = JSON.parse(raw);

    const urlPart =
      data.output_url ||
      data?.data?.output_url ||
      data?.url;

    const finalUrl = new URL(urlPart, "https://media-lab.onrender.com").href;

    loader.style.display = "none";
    statusEl.innerText = "Complete ✔";

    outputEl.innerHTML = `
      <div class="resultCard">
        <div>Output ready</div>
        <a href="${finalUrl}" target="_blank">Download GIF</a>
      </div>
    `;

  } catch (err) {
    loader.style.display = "none";
    statusEl.innerText = "";
    outputEl.innerText = "ERROR: " + err.message;
  }
}

</script>

</body>
</html>
