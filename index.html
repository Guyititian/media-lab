<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Media Lab</title>

<style>
body {
  margin:0;
  background:#0f0f0f;
  color:white;
  font-family:Arial;
}

.header {
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:20px 30px;
  background:#111;
  border-bottom:1px solid #222;
}

.brand {
  font-size:16px;
  font-weight:bold;
  cursor:pointer;
}

.brand:hover {
  opacity:0.7;
}

.header-right {
  font-size:12px;
  opacity:0.6;
}

.panel {
  max-width:520px;
  margin:40px auto;
  background:#1c1c1c;
  padding:20px;
  border-radius:12px;
}

label {
  font-size:12px;
  opacity:0.7;
  display:block;
  margin-top:10px;
}

input, select, button {
  width:100%;
  padding:10px;
  margin-top:8px;
  border:none;
  border-radius:6px;
}

button {
  background:white;
  color:black;
  cursor:pointer;
}

button:hover {
  opacity:0.85;
}

#output {
  margin-top:15px;
  font-size:12px;
  opacity:0.85;
  word-break:break-all;
}

a { color:#7dd3fc; }

.help-row {
  display:flex;
  justify-content:space-between;
  align-items:center;
}

.help {
  font-size:12px;
  opacity:0.7;
  cursor:pointer;
}

.help:hover {
  opacity:1;
}

.modal {
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background:rgba(0,0,0,0.7);
  display:none;
  justify-content:center;
  align-items:center;
}

.modal-content {
  background:#1c1c1c;
  padding:20px;
  border-radius:12px;
  max-width:420px;
  font-size:13px;
  line-height:1.4;
}

.close {
  float:right;
  cursor:pointer;
  opacity:0.7;
}

.close:hover {
  opacity:1;
}
</style>
</head>

<body>

<div class="header">

  <div class="brand" onclick="goHome()">
    Media-Tiles
  </div>

  <div class="header-right">
    Media-Lab Tools
  </div>

</div>

<div class="panel">

  <label>Upload File</label>
  <input type="file" id="file">

  <label>Tool</label>
  <select id="tool">
    <option value="gif_motion">GIF Motion</option>
  </select>

  <div class="help-row">
    <label>Preset</label>
    <div class="help" onclick="openModal()">What do these mean?</div>
  </div>

  <select id="preset">
    <option value="balanced">Balanced</option>
    <option value="fluid_motion">Fluid Motion</option>
  </select>

  <button onclick="runTool()">Generate</button>

  <div id="output"></div>

</div>

<div class="modal" id="modal">
  <div class="modal-content">
    <span class="close" onclick="closeModal()">✕</span>

    <h3>Preset Guide</h3>

    <p><b>Balanced</b><br>
    Stable output with consistent file size and clean motion.</p>

    <p><b>Fluid Motion</b><br>
    Higher interpolation for smoother motion with larger file size.</p>

  </div>
</div>

<script>

function goHome() {
  window.location.href = "https://guyititian.github.io/media-tiles/";
}

function openModal() {
  document.getElementById("modal").style.display = "flex";
}

function closeModal() {
  document.getElementById("modal").style.display = "none";
}

const API_URL = "https://media-lab.onrender.com/upload";

async function runTool() {
  const file = document.getElementById("file").files[0];
  const presetUI = document.getElementById("preset").value;

  if (!file) {
    document.getElementById("output").innerText = "Please select a file.";
    return;
  }

  document.getElementById("output").innerText = "Processing...";

  // FIX: frontend → backend preset mapping
  const presetMap = {
    balanced: "balanced_v1",
    fluid_motion: "fluid_motion_v1"
  };

  const preset = presetMap[presetUI] || "balanced_v1";

  const formData = new FormData();
  formData.append("file", file);
  formData.append("preset", preset);

  try {
    const res = await fetch(API_URL, {
      method: "POST",
      body: formData
    });

    if (!res.ok) {
      const err = await res.text();
      throw new Error("Server error: " + err);
    }

    const data = await res.json();

    const downloadUrl = "https://media-lab.onrender.com" + data.download_url;

    document.getElementById("output").innerHTML =
      "Output: <a href='" + downloadUrl + "' target='_blank'>Download GIF</a>";

  } catch (e) {
    document.getElementById("output").innerText =
      "Error: " + e.message;
  }
}

</script>

</body>
</html>
